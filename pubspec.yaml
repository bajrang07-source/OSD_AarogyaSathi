name: aarogya_sathi
description: ArogyaSathi AI — Offline-first rural health assistant for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Storage
  shared_preferences: ^2.2.3

  # Typography & UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Device features
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  sqflite_common_ffi_web: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
